<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Join Rebuild India</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:#040404;
      overflow:hidden;
      color:white;
    }

    a{
      text-decoration:none;
    }

    /* =========================
       BACKGROUND
    ========================== */

    .background{

      position:fixed;
      inset:0;

      background:
      linear-gradient(
      rgba(0,0,0,0.82),
      rgba(0,0,0,0.92)
      ),
      url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?q=80&w=1920&auto=format&fit=crop');

      background-size:cover;
      background-position:center;

      z-index:-3;

      animation:zoomBg 18s ease-in-out infinite alternate;

    }

    @keyframes zoomBg{

      from{
        transform:scale(1);
      }

      to{
        transform:scale(1.08);
      }

    }

    /* =========================
       GRID
    ========================== */

    .grid{

      position:fixed;
      inset:0;

      background-image:
      linear-gradient(rgba(57,255,20,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.05) 1px, transparent 1px);

      background-size:60px 60px;

      z-index:-2;

      mask-image:linear-gradient(to bottom, transparent, black);

    }

    /* =========================
       GLOW
    ========================== */

    .glow{

      position:absolute;

      width:700px;
      height:700px;

      border-radius:50%;

      background:radial-gradient(
      circle,
      rgba(57,255,20,0.14),
      transparent 70%
      );

      top:-200px;
      right:-200px;

      filter:blur(30px);

      animation:pulseGlow 6s ease-in-out infinite alternate;

    }

    @keyframes pulseGlow{

      from{
        transform:scale(1);
        opacity:0.6;
      }

      to{
        transform:scale(1.2);
        opacity:1;
      }

    }

    /* =========================
       MAIN
    ========================== */

    .main{

      width:100%;
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px;

      position:relative;

    }

    .join-card{

      width:100%;
      max-width:700px;

      background:rgba(255,255,255,0.04);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:32px;

      padding:70px 60px;

      backdrop-filter:blur(20px);

      position:relative;

      overflow:hidden;

      box-shadow:
      0 0 40px rgba(57,255,20,0.08);

    }

    .join-card::before{

      content:'';

      position:absolute;

      top:0;
      left:-100%;

      width:100%;
      height:100%;

      background:linear-gradient(
      90deg,
      transparent,
      rgba(57,255,20,0.08),
      transparent
      );

      transition:1s;

    }

    .join-card:hover::before{
      left:100%;
    }

    /* =========================
       CONTENT
    ========================== */

    .mini-title{

      color:#39ff14;

      font-size:14px;
      font-weight:700;

      letter-spacing:2px;

      margin-bottom:25px;

      text-transform:uppercase;

    }

    .title{

      font-size:72px;

      line-height:0.95;

      font-weight:900;

      margin-bottom:28px;

      text-transform:uppercase;

    }

    .title span{
      color:#39ff14;
    }

    .description{

      color:rgba(255,255,255,0.72);

      line-height:1.9;

      font-size:18px;

      margin-bottom:50px;

    }

    /* =========================
       LOGIN BUTTON
    ========================== */

    .google-btn{

      width:100%;

      height:72px;

      border:none;

      border-radius:18px;

      background:#39ff14;

      color:black;

      font-size:18px;
      font-weight:800;

      cursor:pointer;

      transition:0.4s;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:16px;

    }

    .google-btn:hover{

      transform:translateY(-4px);

      box-shadow:
      0 0 35px rgba(57,255,20,0.4);

    }

    .google-btn img{
      width:28px;
    }

    /* =========================
       TRUST TEXT
    ========================== */

    .trust{

      margin-top:28px;

      text-align:center;

      color:rgba(255,255,255,0.45);

      font-size:14px;

      line-height:1.7;

    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:700px){

      .main{
        padding:20px;
      }

      .join-card{
        padding:50px 30px;
      }

      .title{
        font-size:42px;
      }

      .description{
        font-size:16px;
      }

    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <div class="background"></div>
  <div class="grid"></div>
  <div class="glow"></div>

  <!-- MAIN -->

  <section class="main">

    <div class="join-card">

      <p class="mini-title">
        REBUILD INDIA 🇮🇳
      </p>

      <h1 class="title">
        INDIA NEEDS <span>BUILDERS.</span><br>
        NOT SPECTATORS.
      </h1>

      <p class="description">
        Join India’s youth-led movement for transparent governance,
        clean politics, digital accountability and future-focused development.
      </p>

      <!-- GOOGLE LOGIN -->

      <button class="google-btn" id="googleLogin">

        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">

        Continue With Google

      </button>

      <p class="trust">
        Your information is securely stored and used only
        for movement coordination purposes.
      </p>

    </div>

  </section>

  <!-- FIREBASE -->

  <script type="module">

    // FIREBASE IMPORTS

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup
    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyC3bNRxf8kJDKkucTLVKktba_ulpphKc8o",

      authDomain: "rebuildbharath-658a9.firebaseapp.com",

      projectId: "rebuildbharath-658a9",

      storageBucket: "rebuildbharath-658a9.firebasestorage.app",

      messagingSenderId: "307480289915",

      appId: "1:307480289915:web:31253b04dbd0498d6d78de",

      measurementId: "G-DFC55C8M5N"

    };

    // INITIALIZE

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    const provider = new GoogleAuthProvider();

    // LOGIN BUTTON

    const googleBtn = document.getElementById("googleLogin");

    googleBtn.addEventListener("click", async () => {

      try{

        const result = await signInWithPopup(auth, provider);

        const user = result.user;

        console.log(user);

        // SAVE BASIC USER DATA TEMP

        localStorage.setItem("userName", user.displayName);
        localStorage.setItem("userEmail", user.email);
        localStorage.setItem("userPhoto", user.photoURL);

        // NEXT PAGE

        window.location.href = "details.html";

      }

      catch(error){

        console.log(error);

        alert("Login Failed");

      }

    });

  </script>

</body>
</html>
