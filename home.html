<!DOCTYPE html>

<html lang="en">

<head>

  <!-- TITLE -->
  <title>Rebuild India</title>

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR STARTS HERE -->

  <header class="navbar">

    <div class="container nav-container">

      <!-- LEFT -->

      <div class="logo">

        <span class="logo-mark">
          RI
        </span>

        <div class="logo-text">

          <h2>REBUILD INDIA</h2>

          <p>
            Stop Corruption. Build India.
          </p>

        </div>

      </div>

      <!-- CENTER -->

      <nav class="nav-links">

        <a href="#">Home</a>
        <a href="#">Manifesto</a>
        <a href="#">Movement</a>
        <a href="#">Projects</a>
        <a href="#">Media</a>

      </nav>

      <!-- RIGHT -->

      <a href="#" class="primary-btn nav-btn">
        Join Movement
      </a>

      <!-- MOBILE -->

      <div class="menu-btn">

        ☰

      </div>

    </div>

  </header>





  <!-- ALL OTHER SECTIONS WILL COME HERE -->






  <!-- JAVASCRIPT -->

  <script>

    window.addEventListener("scroll",()=>{

      const navbar =
      document.querySelector(".navbar");

      if(window.scrollY > 40){

        navbar.classList.add("scrolled");

      }

      else{

        navbar.classList.remove("scrolled");

      }

    });

  </script>

</body>

</html>
