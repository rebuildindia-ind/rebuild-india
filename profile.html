<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Profile - Rebuild India</title>

  <!-- FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- ICONS -->

  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{

      background:#030303;

      color:white;

      overflow-x:hidden;

      padding-bottom:120px;

    }

    /* ====================================
       BACKGROUND
    ==================================== */

    .background{

      position:fixed;
      inset:0;

      background:
      radial-gradient(
      circle at top right,
      rgba(57,255,20,0.12),
      transparent 35%
      ),
      #030303;

      z-index:-3;

    }

    .grid{

      position:fixed;
      inset:0;

      background-image:
      linear-gradient(rgba(57,255,20,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.04) 1px, transparent 1px);

      background-size:60px 60px;

      z-index:-2;

    }

    /* ====================================
       BANNER
    ==================================== */

    .banner{

      width:100%;
      height:220px;

      background:
      linear-gradient(
      to bottom,

      #ff9933 0%,
      #ff9933 33%,

      white 33%,
      white 66%,

      #138808 66%,
      #138808 100%
      );

      position:relative;

    }

    .chakra{

      position:absolute;

      top:50%;
      left:50%;

      transform:translate(-50%,-50%);

      width:70px;
      height:70px;

      border-radius:50%;

      border:5px solid #000080;

    }

    /* ====================================
       PROFILE
    ==================================== */

    .profile-section{

      width:100%;

      display:flex;
      flex-direction:column;
      align-items:center;

      margin-top:-70px;

      position:relative;

      z-index:2;

    }

    .profile-image{

      width:140px;
      height:140px;

      border-radius:50%;

      object-fit:cover;

      border:6px solid #39ff14;

      box-shadow:
      0 0 30px rgba(57,255,20,0.4);

    }

    .edit-photo{

      margin-top:18px;

      background:#39ff14;

      color:black;

      border:none;

      padding:12px 20px;

      border-radius:12px;

      font-weight:800;

    }

    .name{

      margin-top:20px;

      font-size:34px;

      font-weight:900;

      text-align:center;

    }

    .role{

      margin-top:12px;

      padding:10px 18px;

      border-radius:999px;

      background:rgba(57,255,20,0.12);

      color:#39ff14;

      font-size:14px;
      font-weight:700;

    }

    .member-id{

      margin-top:18px;

      font-size:28px;

      font-weight:900;

    }

    /* ====================================
       FORM
    ==================================== */

    .form{

      width:calc(100% - 30px);

      margin:40px auto;

      background:rgba(255,255,255,0.03);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:26px;

      padding:24px;

      backdrop-filter:blur(20px);

    }

    .input-box{
      margin-bottom:22px;
    }

    .input-box label{

      display:block;

      margin-bottom:12px;

      font-size:15px;
      font-weight:700;

    }

    .input-box input,
    .input-box select,
    .input-box textarea{

      width:100%;

      background:rgba(255,255,255,0.05);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:16px;

      padding:18px;

      color:white;

      font-size:16px;

      outline:none;

    }

    .input-box textarea{

      min-height:120px;

      resize:none;

    }

    select option{
      background:#111;
    }

    .save-btn{

      width:100%;

      height:68px;

      border:none;

      border-radius:18px;

      background:#39ff14;

      color:black;

      font-size:18px;
      font-weight:900;

      margin-top:20px;

    }

    /* ====================================
       BOTTOM NAV
    ==================================== */

    .bottom-nav{

      position:fixed;

      bottom:0;
      left:0;

      width:100%;

      height:92px;

      background:#050505;

      border-top:1px solid rgba(255,255,255,0.08);

      display:flex;
      justify-content:space-around;
      align-items:center;

      z-index:999;

    }

    .nav-item{

      display:flex;
      flex-direction:column;
      align-items:center;

      gap:8px;

      color:rgba(255,255,255,0.72);

      font-size:13px;

    }

    .nav-item i{
      font-size:24px;
    }

    .nav-active{
      color:#39ff14;
    }

  </style>

</head>

<body>

  <div class="background"></div>
  <div class="grid"></div>

  <!-- BANNER -->

  <div class="banner">

    

  </div>

  <!-- PROFILE -->

  <div class="profile-section">

    <img
    id="profileImage"
    class="profile-image">

    <button class="edit-photo">
      Change Photo
    </button>

    <h1 class="name" id="profileName">
      Loading...
    </h1>

    <div class="role" id="profileRole">
      MEMBER
    </div>

    <div class="member-id" id="profileMemberId">
      RI-000001
    </div>

  </div>

  <!-- FORM -->

  <div class="form">

    <div class="input-box">

      <label>Full Name</label>

      <input type="text" id="nameInput">

    </div>

    <div class="input-box">

      <label>Age</label>

      <input type="number" id="ageInput">

    </div>

    <div class="input-box">

      <label>District</label>

      <select id="districtInput">

        <option>Bagalkot</option>
        <option>Ballari</option>
        <option>Belagavi</option>
        <option>Bengaluru Rural</option>
        <option>Bengaluru Urban</option>
        <option>Bidar</option>
        <option>Chamarajanagar</option>
        <option>Chikkaballapur</option>
        <option>Chikkamagaluru</option>
        <option>Chitradurga</option>
        <option>Dakshina Kannada</option>
        <option>Davanagere</option>
        <option>Dharwad</option>
        <option>Gadag</option>
        <option>Hassan</option>
        <option>Haveri</option>
        <option>Kalaburagi</option>
        <option>Kodagu</option>
        <option>Kolar</option>
        <option>Koppal</option>
        <option>Mandya</option>
        <option>Mysuru</option>
        <option>Raichur</option>
        <option>Ramanagara</option>
        <option>Shivamogga</option>
        <option>Tumakuru</option>
        <option>Udupi</option>
        <option>Uttara Kannada</option>
        <option>Vijayapura</option>
        <option>Vijayanagara</option>
        <option>Yadgir</option>

      </select>

    </div>

    <div class="input-box">

      <label>Constituency</label>

      <input
      type="text"
      id="constituencyInput"
      placeholder="Will be added later">

    </div>

    <div class="input-box">

      <label>About You</label>

      <textarea
      id="bioInput"
      placeholder="Tell about yourself..."></textarea>

    </div>

    <button class="save-btn" id="saveBtn">

      SAVE PROFILE

    </button>

  </div>

  <!-- BOTTOM NAV -->

  <div class="bottom-nav">

    <a href="dashboard.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      Dashboard
    </a>

    <div class="nav-item">
      <i class="fa-solid fa-tower-broadcast"></i>
      Feed
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-user-plus"></i>
      Refer
    </div>

    <div class="nav-item">
      <i class="fa-solid fa-triangle-exclamation"></i>
      Report
    </div>

    <div class="nav-item nav-active">
      <i class="fa-solid fa-user"></i>
      Profile
    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {

      getFirestore,
      doc,
      getDoc,
      updateDoc

    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // FIREBASE

    const firebaseConfig = {

      apiKey: "AIzaSyC3bNRxf8kJDKkucTLVKktba_ulpphKc8o",

      authDomain: "rebuildbharath-658a9.firebaseapp.com",

      projectId: "rebuildbharath-658a9",

      storageBucket: "rebuildbharath-658a9.firebasestorage.app",

      messagingSenderId: "307480289915",

      appId: "1:307480289915:web:31253b04dbd0498d6d78de",

      measurementId: "G-DFC55C8M5N"

    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const email =
    localStorage.getItem("userEmail");

    // LOAD USER

    async function loadUser(){

      const docRef =
      doc(db,"members",email);

      const docSnap =
      await getDoc(docRef);

      if(docSnap.exists()){

        const data =
        docSnap.data();

        document.getElementById("profileImage")
        .src = data.photo;

        document.getElementById("profileName")
        .innerText = data.name;

        document.getElementById("profileRole")
        .innerText = data.role;

        document.getElementById("profileMemberId")
        .innerText = data.memberId;

        // FORM

        document.getElementById("nameInput")
        .value = data.name || "";

        document.getElementById("ageInput")
        .value = data.age || "";

        document.getElementById("districtInput")
        .value = data.district || "";

        document.getElementById("constituencyInput")
        .value = data.constituency || "";

        document.getElementById("bioInput")
        .value = data.bio || "";

      }

    }

    loadUser();

    // SAVE

    document.getElementById("saveBtn")
    .addEventListener("click", async ()=>{

      const docRef =
      doc(db,"members",email);

      await updateDoc(docRef,{

        name:
        document.getElementById("nameInput").value,

        age:
        document.getElementById("ageInput").value,

        district:
        document.getElementById("districtInput").value,

        constituency:
        document.getElementById("constituencyInput").value,

        bio:
        document.getElementById("bioInput").value

      });

      alert("Profile Updated Successfully");

      loadUser();

    });

  </script>

</body>
</html>
