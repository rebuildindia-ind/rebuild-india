<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rebuild India Profile</title>

  <!-- FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- ICONS -->

  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background:#efe6d7;

      font-family:'Inter',sans-serif;

      overflow:hidden;

      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:10px;

    }

    /* =====================================
       CARD
    ===================================== */

    .profile-card{

      width:100%;
      max-width:430px;

      height:96vh;

      background:#120b08;

      border:2px solid #3c2415;

      position:relative;

      overflow:hidden;

      box-shadow:
      0 20px 50px rgba(0,0,0,0.35);

    }

    /* =====================================
       HEADER
    ===================================== */

    .header{

      width:100%;

      background:#efe6d7;

      border-bottom:2px solid #3c2415;

      padding:22px 22px 18px;

      display:flex;
      justify-content:space-between;
      align-items:center;

    }

    .brand{

      display:flex;
      align-items:center;
      gap:12px;

    }

    .logo{

      width:52px;
      height:52px;

      border-radius:50%;

      border:2px solid #d96b1d;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:24px;

      color:#1f5c3f;

      font-weight:900;

    }

    .brand-text{

      font-family:'Anton',sans-serif;

      line-height:1;

      font-size:34px;

      color:#120b08;

      letter-spacing:1px;

    }

    .member{

      text-align:right;

    }

    .member p{

      font-size:11px;

      letter-spacing:2px;

      color:#d96b1d;

      font-weight:700;

    }

    .member h2{

      margin-top:6px;

      font-family:'Anton',sans-serif;

      font-size:34px;

      letter-spacing:2px;

      color:#120b08;

    }

    /* =====================================
       FLAG
    ===================================== */

    .flag{

      width:100%;
      height:150px;

      position:relative;

    }

    .saffron{
      height:33.33%;
      background:#d96b1d;
    }

    .white{
      height:33.33%;
      background:#efe6d7;
    }

    .green{
      height:33.33%;
      background:#1f5c3f;
    }

    .chakra{

      position:absolute;

      top:50%;
      left:50%;

      transform:translate(-50%,-50%);

      width:58px;
      height:58px;

      border:4px solid #1b2f75;

      border-radius:50%;

    }

    /* =====================================
       PROFILE IMAGE
    ===================================== */

    .profile-image-wrap{

      width:170px;
      height:170px;

      border-radius:50%;

      background:#efe6d7;

      border:5px solid #efe6d7;

      position:absolute;

      top:150px;
      left:50%;

      transform:translateX(-50%);

      overflow:hidden;

      z-index:5;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.35);

    }

    .profile-image{

      width:100%;
      height:100%;

      object-fit:cover;

    }

    .edit-btn{

      position:absolute;

      bottom:6px;
      right:6px;

      width:42px;
      height:42px;

      border-radius:50%;

      background:#d96b1d;

      color:white;

      border:none;

      font-size:16px;

      display:flex;
      justify-content:center;
      align-items:center;

    }

    /* =====================================
       CONTENT
    ===================================== */

    .content{

      padding:
      115px 22px 20px;

      color:white;

    }

    .name{

      text-align:center;

      font-family:'Anton',sans-serif;

      font-size:54px;

      letter-spacing:2px;

      line-height:1;

    }

    .role{

      text-align:center;

      margin-top:14px;

      color:#d96b1d;

      font-weight:800;

      letter-spacing:3px;

      font-size:15px;

    }

    .line{

      width:100%;
      height:1px;

      background:rgba(255,255,255,0.12);

      margin:24px 0;

    }

    .quote{

      text-align:center;

      color:#cfc4b7;

      font-size:13px;

      letter-spacing:4px;

      margin-bottom:24px;

    }

    /* =====================================
       GRID
    ===================================== */

    .grid{

      display:grid;

      grid-template-columns:1fr 1fr;

      border:1px solid rgba(255,255,255,0.12);

    }

    .box{

      border-right:1px solid rgba(255,255,255,0.12);
      border-bottom:1px solid rgba(255,255,255,0.12);

      padding:18px;

      min-height:110px;

    }

    .box:nth-child(2n){
      border-right:none;
    }

    .box i{

      color:#d96b1d;

      font-size:24px;

      margin-bottom:14px;

    }

    .label{

      color:#d96b1d;

      font-size:12px;

      font-weight:700;

      letter-spacing:2px;

      margin-bottom:10px;

    }

    .value{

      font-size:16px;

      line-height:1.6;

      color:#f3ece3;

      word-break:break-word;

    }

    /* =====================================
       ABOUT
    ===================================== */

    .about{

      border-left:1px solid rgba(255,255,255,0.12);
      border-right:1px solid rgba(255,255,255,0.12);
      border-bottom:1px solid rgba(255,255,255,0.12);

      padding:18px;

    }

    .about i{

      color:#d96b1d;

      font-size:28px;

      margin-bottom:14px;

    }

    /* =====================================
       BUTTONS
    ===================================== */

    .buttons{

      display:grid;

      grid-template-columns:1fr 1fr;

      margin-top:18px;

      gap:0;

    }

    .btn{

      height:68px;

      border:none;

      font-family:'Anton',sans-serif;

      font-size:22px;

      letter-spacing:2px;

      color:white;

    }

    .edit{

      background:#1f5c3f;
    }

    .save{

      background:#d96b1d;
    }

  </style>

</head>

<body>

  <!-- CARD -->

  <div class="profile-card">

    <!-- HEADER -->

    <div class="header">

      <div class="brand">

        <div class="logo">
          🇮🇳
        </div>

        <div class="brand-text">
          REBUILD<br>
          INDIA
        </div>

      </div>

      <div class="member">

        <p>MEMBER ID</p>

        <h2 id="memberId">
          RI-000001
        </h2>

      </div>

    </div>

    <!-- FLAG -->

    <div class="flag">

      <div class="saffron"></div>
      <div class="white"></div>
      <div class="green"></div>

      <div class="chakra"></div>

    </div>

    <!-- PROFILE IMAGE -->

    <div class="profile-image-wrap">

      <img
      id="profileImage"
      class="profile-image">

      <button class="edit-btn">
        <i class="fa-solid fa-pen"></i>
      </button>

    </div>

    <!-- CONTENT -->

    <div class="content">

      <h1 class="name" id="profileName">
        LOADING
      </h1>

      <div class="role" id="profileRole">
        ACTIVE MEMBER
      </div>

      <div class="line"></div>

      <div class="quote">
        TOGETHER • RESILIENT • UNSTOPPABLE
      </div>

      <!-- GRID -->

      <div class="grid">

        <div class="box">

          <i class="fa-solid fa-user"></i>

          <div class="label">
            FULL NAME
          </div>

          <div class="value" id="fullName">
            Loading...
          </div>

        </div>

        <div class="box">

          <i class="fa-solid fa-calendar"></i>

          <div class="label">
            AGE
          </div>

          <div class="value" id="age">
            --
          </div>

        </div>

        <div class="box">

          <i class="fa-solid fa-location-dot"></i>

          <div class="label">
            DISTRICT
          </div>

          <div class="value" id="district">
            --
          </div>

        </div>

        <div class="box">

          <i class="fa-solid fa-building-columns"></i>

          <div class="label">
            CONSTITUENCY
          </div>

          <div class="value" id="constituency">
            --
          </div>

        </div>

        <div class="box">

          <i class="fa-solid fa-shield-halved"></i>

          <div class="label">
            ROLE
          </div>

          <div class="value" id="roleValue">
            MEMBER
          </div>

        </div>

        <div class="box">

          <i class="fa-solid fa-calendar-days"></i>

          <div class="label">
            JOINED ON
          </div>

          <div class="value" id="joined">
            --
          </div>

        </div>

      </div>

      <!-- ABOUT -->

      <div class="about">

        <i class="fa-solid fa-quote-left"></i>

        <div class="label">
          ABOUT ME
        </div>

        <div class="value" id="bio">
          I believe in transparency and rebuilding India together.
        </div>

      </div>

      <!-- BUTTONS -->

      <div class="buttons">

        <button class="btn edit">
          EDIT PROFILE
        </button>

        <button class="btn save">
          SAVE CHANGES
        </button>

      </div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {

      getFirestore,
      doc,
      getDoc

    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyC3bNRxf8kJDKkucTLVKktba_ulpphKc8o",

      authDomain: "rebuildbharath-658a9.firebaseapp.com",

      projectId: "rebuildbharath-658a9",

      storageBucket: "rebuildbharath-658a9.firebasestorage.app",

      messagingSenderId: "307480289915",

      appId: "1:307480289915:web:31253b04dbd0498d6d78de",

      measurementId: "G-DFC55C8M5N"

    };

    // INIT

    const app =
    initializeApp(firebaseConfig);

    const db =
    getFirestore(app);

    // USER

    const email =
    localStorage.getItem("userEmail");

    // LOAD PROFILE

    async function loadProfile(){

      const docRef =
      doc(db,"members",email);

      const docSnap =
      await getDoc(docRef);

      if(docSnap.exists()){

        const data =
        docSnap.data();

        document.getElementById("profileImage")
        .src = data.photo;

        document.getElementById("profileName")
        .innerText = data.name;

        document.getElementById("profileRole")
        .innerText = data.role;

        document.getElementById("memberId")
        .innerText = data.memberId;

        document.getElementById("fullName")
        .innerText = data.name;

        document.getElementById("age")
        .innerText = data.age || "--";

        document.getElementById("district")
        .innerText = data.district || "--";

        document.getElementById("constituency")
        .innerText = data.constituency || "--";

        document.getElementById("roleValue")
        .innerText = data.role || "MEMBER";

        document.getElementById("bio")
        .innerText =
        data.bio ||
        "I believe in transparency and rebuilding India together.";

        const joined =
        new Date(data.joinedAt.seconds * 1000);

        document.getElementById("joined")
        .innerText =
        joined.toDateString();

      }

    }

    loadProfile();

  </script>

</body>
</html>
