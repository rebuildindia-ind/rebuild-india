<!-- =========================================================
REBUILD INDIA - profile.html
PREMIUM FULLSCREEN PROFILE CARD
NO SCROLL • FIREBASE LIVE
========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rebuild India Profile</title>

  <!-- FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- ICONS -->

  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{

      width:100%;
      height:100%;

      overflow:hidden;

      font-family:'Inter',sans-serif;

      background:#F3EBDD;

      color:#1A120D;

    }

    body{

      display:flex;
      justify-content:center;
      align-items:center;

      padding:12px;

    }

    /* ====================================
       MAIN CARD
    ==================================== */

    .card{

      width:100%;
      max-width:430px;

      height:96vh;

      background:#1B120D;

      border:3px solid #0f0f0f;

      box-shadow:
      10px 10px 0px #00000020;

      position:relative;

      overflow:hidden;

    }

    /* ====================================
       TOP HEADER
    ==================================== */

    .topbar{

      width:100%;

      height:72px;

      background:#F3EBDD;

      border-bottom:2px solid #000;

      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:0 20px;

    }

    .brand{

      display:flex;
      align-items:center;

      gap:12px;

    }

    .logo{

      width:46px;
      height:46px;

      border-radius:50%;

      background:
      linear-gradient(
      to bottom,
      #D96B1D 0%,
      #D96B1D 33%,
      white 33%,
      white 66%,
      #1F5C3F 66%,
      #1F5C3F 100%
      );

      border:2px solid #111;

      position:relative;

    }

    .logo::after{

      content:"";

      position:absolute;

      width:14px;
      height:14px;

      border:2px solid #0B2D6D;

      border-radius:50%;

      top:50%;
      left:50%;

      transform:translate(-50%,-50%);

    }

    .brand h1{

      font-family:'Anton',sans-serif;

      font-size:26px;

      line-height:1;

      letter-spacing:1px;

    }

    .member-box{

      text-align:right;

    }

    .member-box p{

      color:#D96B1D;

      font-size:11px;

      font-weight:800;

      letter-spacing:2px;

    }

    .member-box h2{

      margin-top:4px;

      font-family:'Anton',sans-serif;

      letter-spacing:2px;

      font-size:26px;

    }

    /* ====================================
       FLAG
    ==================================== */

    .flag{

      width:100%;

      height:170px;

      position:relative;

      background:
      linear-gradient(
      to bottom,

      #D96B1D 0%,
      #D96B1D 33%,

      #F3EBDD 33%,
      #F3EBDD 66%,

      #1F5C3F 66%,
      #1F5C3F 100%
      );

    }

    .chakra{

      position:absolute;

      top:50%;
      left:50%;

      transform:translate(-50%,-50%);

      width:54px;
      height:54px;

      border-radius:50%;

      border:4px solid #0B2D6D;

    }

    /* ====================================
       PROFILE IMAGE
    ==================================== */

    .profile-image{

      position:absolute;

      top:145px;
      left:50%;

      transform:translateX(-50%);

      width:130px;
      height:130px;

      border-radius:50%;

      object-fit:cover;

      border:6px solid #F3EBDD;

      z-index:5;

      background:white;

    }

    .edit-btn{

      position:absolute;

      top:235px;
      right:125px;

      width:42px;
      height:42px;

      border:none;

      border-radius:50%;

      background:#D96B1D;

      color:white;

      font-size:16px;

      z-index:10;

    }

    /* ====================================
       CONTENT
    ==================================== */

    .content{

      width:100%;

      padding:95px 18px 18px;

      color:#F3EBDD;

    }

    .name{

      text-align:center;

      font-family:'Anton',sans-serif;

      font-size:54px;

      line-height:1;

      letter-spacing:1px;

      text-transform:uppercase;

    }

    .role{

      margin-top:10px;

      text-align:center;

      color:#D96B1D;

      font-size:18px;

      font-weight:800;

      letter-spacing:2px;

    }

    .line{

      width:100%;

      height:1px;

      background:#ffffff20;

      margin:18px 0;

    }

    .quote{

      text-align:center;

      font-size:13px;

      letter-spacing:4px;

      color:#d2c6b8;

      margin-bottom:20px;

    }

    /* ====================================
       GRID
    ==================================== */

    .grid{

      width:100%;

      border:1px solid #ffffff20;

    }

    .row{

      display:grid;

      grid-template-columns:1fr 1fr;

      border-bottom:1px solid #ffffff15;

    }

    .row:last-child{
      border-bottom:none;
    }

    .box{

      min-height:92px;

      padding:14px;

      border-right:1px solid #ffffff15;

      display:flex;
      align-items:center;
      gap:14px;

    }

    .box:last-child{
      border-right:none;
    }

    .icon{

      width:54px;
      height:54px;

      border:1px solid #D96B1D;

      color:#D96B1D;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:22px;

      flex-shrink:0;

    }

    .info small{

      display:block;

      color:#D96B1D;

      font-size:11px;

      font-weight:800;

      letter-spacing:2px;

      margin-bottom:7px;

    }

    .info h3{

      font-size:18px;

      line-height:1.4;

      font-weight:500;

      word-break:break-word;

    }

    /* ====================================
       ABOUT
    ==================================== */

    .about{

      padding:18px;

      display:flex;
      gap:14px;

      align-items:flex-start;

    }

    /* ====================================
       BUTTONS
    ==================================== */

    .buttons{

      width:100%;

      display:grid;

      grid-template-columns:1fr 1fr;

      margin-top:16px;

      gap:0;

    }

    .btn{

      height:68px;

      border:none;

      font-family:'Anton',sans-serif;

      font-size:22px;

      letter-spacing:1px;

      color:white;

    }

    .edit{

      background:#1F5C3F;
    }

    .save{

      background:#D96B1D;
    }

    /* ====================================
       MOBILE
    ==================================== */

    @media(max-width:420px){

      .name{
        font-size:42px;
      }

      .member-box h2{
        font-size:20px;
      }

      .brand h1{
        font-size:20px;
      }

      .info h3{
        font-size:15px;
      }

      .btn{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

  <!-- CARD -->

  <div class="card">

    <!-- TOPBAR -->

    <div class="topbar">

      <div class="brand">

        <div class="logo"></div>

        <h1>
          REBUILD<br>
          INDIA
        </h1>

      </div>

      <div class="member-box">

        <p>MEMBER ID</p>

        <h2 id="memberId">
          RI-000001
        </h2>

      </div>

    </div>

    <!-- FLAG -->

    <div class="flag">

      <div class="chakra"></div>

    </div>

    <!-- PROFILE IMAGE -->

    <img
    id="profileImage"
    class="profile-image">

    <button class="edit-btn">
      <i class="fa-solid fa-pen"></i>
    </button>

    <!-- CONTENT -->

    <div class="content">

      <h1
      class="name"
      id="profileName">

        LOADING

      </h1>

      <div
      class="role"
      id="profileRole">

        MEMBER

      </div>

      <div class="line"></div>

      <div class="quote">
        TOGETHER • RESILIENT • UNSTOPPABLE
      </div>

      <!-- GRID -->

      <div class="grid">

        <!-- ROW -->

        <div class="row">

          <div class="box">

            <div class="icon">
              <i class="fa-solid fa-user"></i>
            </div>

            <div class="info">

              <small>FULL NAME</small>

              <h3 id="fullName">
                Loading
              </h3>

            </div>

          </div>

          <div class="box">

            <div class="icon">
              <i class="fa-solid fa-calendar"></i>
            </div>

            <div class="info">

              <small>AGE</small>

              <h3 id="age">
                --
              </h3>

            </div>

          </div>

        </div>

        <!-- ROW -->

        <div class="row">

          <div class="box">

            <div class="icon">
              <i class="fa-solid fa-location-dot"></i>
            </div>

            <div class="info">

              <small>DISTRICT</small>

              <h3 id="district">
                --
              </h3>

            </div>

          </div>

          <div class="box">

            <div class="icon">
              <i class="fa-solid fa-building-columns"></i>
            </div>

            <div class="info">

              <small>CONSTITUENCY</small>

              <h3 id="constituency">
                --
              </h3>

            </div>

          </div>

        </div>

        <!-- ROW -->

        <div class="row">

          <div class="box">

            <div class="icon">
              <i class="fa-solid fa-shield"></i>
            </div>

            <div class="info">

              <small>ROLE</small>

              <h3 id="role2">
                MEMBER
              </h3>

            </div>

          </div>

          <div class="box">

            <div class="icon">
              <i class="fa-solid fa-calendar-days"></i>
            </div>

            <div class="info">

              <small>JOINED ON</small>

              <h3 id="joinedDate">
                --
              </h3>

            </div>

          </div>

        </div>

        <!-- ABOUT -->

        <div class="about">

          <div class="icon">
            <i class="fa-solid fa-quote-left"></i>
          </div>

          <div class="info">

            <small>ABOUT ME</small>

            <h3 id="bio">
              I believe in truth, transparency and building a stronger India.
            </h3>

          </div>

        </div>

      </div>

      <!-- BUTTONS -->

      <div class="buttons">

        <button class="btn edit">
          EDIT PROFILE
        </button>

        <button class="btn save">
          SAVE CHANGES
        </button>

      </div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      doc,
      getDoc
    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyC3bNRxf8kJDKkucTLVKktba_ulpphKc8o",

      authDomain: "rebuildbharath-658a9.firebaseapp.com",

      projectId: "rebuildbharath-658a9",

      storageBucket: "rebuildbharath-658a9.firebasestorage.app",

      messagingSenderId: "307480289915",

      appId: "1:307480289915:web:31253b04dbd0498d6d78de",

      measurementId: "G-DFC55C8M5N"

    };

    // INIT

    const app =
    initializeApp(firebaseConfig);

    const db =
    getFirestore(app);

    // USER EMAIL

    const email =
    localStorage.getItem("userEmail");

    // LOAD USER

    async function loadUser(){

      const docRef =
      doc(db,"members",email);

      const docSnap =
      await getDoc(docRef);

      if(docSnap.exists()){

        const data =
        docSnap.data();

        // PROFILE

        document.getElementById("profileImage")
        .src = data.photo || "";

        document.getElementById("profileName")
        .innerText = data.name || "";

        document.getElementById("profileRole")
        .innerText = data.role || "MEMBER";

        document.getElementById("role2")
        .innerText = data.role || "MEMBER";

        document.getElementById("memberId")
        .innerText = data.memberId || "";

        document.getElementById("fullName")
        .innerText = data.name || "";

        document.getElementById("age")
        .innerText = data.age || "--";

        document.getElementById("district")
        .innerText = data.district || "--";

        document.getElementById("constituency")
        .innerText = data.constituency || "--";

        document.getElementById("bio")
        .innerText =
        data.bio ||
        "I believe in truth, transparency and building a stronger India.";

        // DATE

        if(data.joinedAt){

          const joined =
          new Date(data.joinedAt.seconds * 1000);

          document.getElementById("joinedDate")
          .innerText =
          joined.toLocaleDateString();

        }

      }

    }

    loadUser();

  </script>

</body>
</html>
